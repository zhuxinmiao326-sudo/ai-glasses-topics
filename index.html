function getPlatformSearchURL(platform, keyword) {
  const encoded = encodeURIComponent(keyword || '');
  const urls = {
    douyin: `https://www.douyin.com/search/${encoded}`,
    bilibili: `https://search.bilibili.com/all?keyword=${encoded}`,
    xiaohongshu: `https://www.xiaohongshu.com/search_result?keyword=${encoded}`,
    cross: `https://www.baidu.com/s?wd=${encoded}`
  };
  return urls[platform] || '#';
}

function renderStars(count) {
  return '\u2B50'.repeat(count);
}

function renderTop3(top3) {
  return `
    <div class="top3-section">
      <h2>\uD83D\uDD25 本期最该立刻拍的三连</h2>
      <div class="top3-list">
        ${top3.map((item, i) => `
          <div class="top3-item">
            <div class="rank">TOP ${i + 1}</div>
            <div class="title">${item.title}</div>
            <div class="meta">蹭：${item.hotspot} · 难度：${item.difficulty}</div>
            <div class="stars">爆款指数：${renderStars(item.stars)}</div>
            ${item.warning ? `<div class="warning">\u26A0\uFE0F ${item.warning}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderPlatform(key, platform, data) {
  const categories = data.categories.map(cat => `
    <div class="category-title">${cat.title}</div>
    <div class="topics-grid">
      ${cat.topics.map(topic => `
        <div class="topic-card">
          <a class="card-link" href="${topic.link || getPlatformSearchURL(key, topic.title)}" target="_blank" rel="noopener"></a>
          <span class="link-hint">\u2197</span>
          <div>
            <span class="hotspot-tag">${topic.hotspot}</span>
            <span class="heat">${topic.heat}</span>
            <span class="priority-badge priority-${topic.priority || 'P3'}">${topic.priority || 'P3'}</span>
          </div>
          <div class="idea">${topic.idea}</div>
          <div class="desc">${topic.desc}</div>
          <div class="formula">\uD83D\uDCD0 ${topic.formula}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
  return `<div class="platform-panel" id="panel-${key}">${categories}</div>`;
}

function renderRisks(risks) {
  return `
    <div class="risk-section">
      <h3>\uD83D\uDEA8 风险红线提醒</h3>
      ${risks.map(r => `
        <div class="risk-item"><strong>${r.title}：</strong>${r.desc}</div>
      `).join('')}
    </div>
  `;
}

function renderHotlist(platforms, weekDate) {
  const platformNames = { douyin: '抖音热榜', bilibili: 'B站排行榜', xiaohongshu: '小红书热点', cross: '跨平台热点' };
  const hotlistData = HOTLIST_DATA[weekDate] || {};
  const platformSections = Object.keys(platforms).map(key => {
    const items = hotlistData[key] || [];
    if (items.length === 0) return '';
    const itemsHtml = items.map(item => {
      const url = item.url || getPlatformSearchURL(key, item.title);
      return `<a class="hotlist-item" href="${url}" target="_blank" rel="noopener">${item.title}<span class="hot-heat">${item.heat}</span></a>`;
    }).join('');
    return `
      <div class="hotlist-platform">
        <h4>${platformNames[key] || platforms[key].name}</h4>
        <div class="hotlist-items">${itemsHtml}</div>
      </div>
    `;
  }).join('');
  if (!platformSections.trim()) return '';
  return `
    <div class="hotlist-section">
      <h3>\uD83D\uDCCA 本周各平台热榜数据来源</h3>
      ${platformSections}
    </div>
  `;
}

function renderData(data) {
  const platformKeys = Object.keys(data.platforms);
  const tabs = platformKeys.map((key, i) => {
    const p = data.platforms[key];
    return `<button class="tab-btn ${i === 0 ? 'active' : ''}" data-platform="${key}">${p.name}（${p.count}条）</button>`;
  }).join('');

  const panels = platformKeys.map((key, i) => {
    const html = renderPlatform(key, data.platforms[key], data.platforms[key]);
    return html.replace('class="platform-panel"', `class="platform-panel ${i === 0 ? 'active' : ''}"`);
  }).join('');

  const contentEl = document.getElementById('content');
  contentEl.innerHTML = `
    ${renderTop3(data.top3)}
    <div class="tabs">${tabs}</div>
    ${panels}
    ${renderRisks(data.risks)}
    ${renderHotlist(data.platforms, data.date)}
    <div class="source-note">${data.source}</div>
  `;

  // Tab switching
  contentEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      contentEl.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      contentEl.querySelectorAll('.platform-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`panel-${btn.dataset.platform}`).classList.add('active');
    });
  });
}

function loadWeek(key) {
  const contentEl = document.getElementById('content');
  const data = EMBEDDED_DATA[key];
  if (data) {
    renderData(data);
  } else {
    contentEl.innerHTML = '<div class="loading">未找到该周数据</div>';
  }
}

function init() {
  const select = document.getElementById('weekSelect');
  select.innerHTML = weekIndex.map((w, i) => `<option value="${w.file}" ${i === 0 ? 'selected' : ''}>${w.label}</option>`).join('');

  select.addEventListener('change', () => {
    if (select.value) loadWeek(select.value);
  });

  if (weekIndex.length > 0) {
    loadWeek(weekIndex[0].file);
  }
}

init();
</script>
